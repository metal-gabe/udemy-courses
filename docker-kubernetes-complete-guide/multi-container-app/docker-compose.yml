version: '3'
services:
   postgres:
      image: 'postgres:latest'
   redis:
      image: 'redis:latest'
   nginx:
      restart: always
      build:
         dockerfile: dev.Dockerfile
         context: ./nginx
      ports:
         - '3050:80'
      depends_on:
         - api
         - client
   api:
      build:
         dockerfile: dev.Dockerfile
         context: ./server
      volumes:
         - /app/node_modules
         - ./server:/app
      environment:
         - REDIS_HOST=redis
         - REDIS_PORT=6379
         - PGDATABASE=postgres
         - PGHOST=postgres
         - PGPASSWORD=postgres_password
         - PGPORT=5432
         - PGUSER=postgres
   client:
      build:
         dockerfile: dev.Dockerfile
         context: ./client
      environment:
         - WDS_SOCKET_PORT=0
      volumes:
         - /app/node_modules
         - ./client:/app
   worker:
      build:
         dockerfile: dev.Dockerfile
         context: ./worker
      volumes:
         - /app/node_modules
         - ./worker:/app
      environment:
         - REDIS_HOST=redis
         - REDIS_PORT=6379
